name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Publish (skip if version unchanged)
        run: |
          # Only publish when package.json version doesn't already exist in the registry.
          # Avoids CI failures on doc-only pushes.
          pkg_version=$(node -p "require('./package.json').version")
          pkg_name=$(node -p "require('./package.json').name")
          if npm view "${pkg_name}@${pkg_version}" version 2>/dev/null; then
            echo "Version ${pkg_version} already published — skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
